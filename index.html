<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Armazenamento SENAI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TÍTULO -->
    <h1 class="titulo">
        Armazenamento de dados I1-TEMSD
    </h1>

    <!-- PASTA -->
    <div class="folders"
    id="folders">

        <div class="folder-item"
        onclick="abrirSistema()">

            <!-- TROQUE IMG SE NECESSÁRIO -->
            <img src="Img/Pasta sem fundo.png">

            <span>Energia Elétrica</span>

        </div>

    </div>

    <!-- SISTEMA -->
    <div class="sistema"
    id="sistema">

        <!-- MENU -->
        <div class="left-panel">

            <!-- VOLTAR -->
            <button class="menu-button voltar"
            onclick="voltarInicio()">

                ← Voltar

            </button>

            <!-- ANOTAÇÕES -->
            <button class="menu-button"
            onclick="toggleAnotacoes()">

                Anotações

            </button>

            <!-- CONTEÚDO -->
            <button class="menu-button"
            onclick="toggleConteudo()">

                Conteúdo

            </button>

        </div>

        <!-- ANOTAÇÕES -->
        <div class="right-panel"
        id="anotacoesPanel">

            <h1>Anotações</h1>

            <textarea
            placeholder="Digite suas anotações aqui..."></textarea>

        </div>

        <!-- CONTEÚDO -->
        <div class="right-panel"
        id="conteudoPanel">

            <h1>Conteúdo</h1>

            <div class="conteudo-texto">

                AQUI VOCÊ COLOCARÁ O TEXTO FIXO DO SITE.

                <br><br>

                Esse painel possui scroll automático.

                <br><br><br>

                Você pode adicionar
                conteúdos infinitos aqui.

                <br><br><br><br><br><br><br><br><br>

                Mais conteúdo...

            </div>

        </div>

    </div>

    <!-- LOGO -->
    <!-- TROQUE IMG SE NECESSÁRIO -->
    <img src="Img/SENAILogo.png"
    class="senai-logo">

<script>

const sistema =
document.getElementById("sistema");

const folders =
document.getElementById("folders");

const anotacoes =
document.getElementById("anotacoesPanel");

const conteudo =
document.getElementById("conteudoPanel");

/* ABRIR SISTEMA */
function abrirSistema(){

    sistema.style.display = "flex";

    folders.style.display = "none";
}

/* VOLTAR */
function voltarInicio(){

    sistema.style.display = "none";

    folders.style.display = "flex";

    anotacoes.classList.remove("open");

    conteudo.classList.remove("open");
}

/* ANOTAÇÕES */
function toggleAnotacoes(){

    anotacoes.classList.toggle("open");

    conteudo.classList.remove("open");
}

/* CONTEÚDO */
function toggleConteudo(){

    conteudo.classList.toggle("open");

    anotacoes.classList.remove("open");
}

</script>

</body>

</html>
